<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Teacher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button type="button" class="new-chat-btn" id="newChatBtn" aria-label="New chat">
          <span class="new-chat-icon">+</span>
          <span>New chat</span>
        </button>
      </div>
      <div class="chat-list-wrap">
        <div class="chat-list" id="chatList" role="list"></div>
      </div>
      <div class="sidebar-footer">
        <div class="backend-badge" id="backendBadge" aria-live="polite">—</div>
      </div>
    </aside>

    <div class="main-wrap">
      <header class="main-header">
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <h1 class="main-title">AI Teacher</h1>
        <p class="main-subtitle">Chat</p>
      </header>

      <main class="main">
        <div class="messages" id="messages" role="log" aria-live="polite">
          <div class="welcome" id="welcome">
            <div class="welcome-icon">◇</div>
            <h2>How can I help you today?</h2>
            <p>Ask me anything.</p>
          </div>
        </div>

        <div class="input-area">
          <div class="input-wrap">
            <textarea
              id="input"
              class="input"
              rows="1"
              placeholder="Message AI Teacher…"
              aria-label="Your message"
            ></textarea>
            <button type="button" class="send-btn" id="sendBtn" aria-label="Send">
              <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
              </svg>
            </button>
          </div>
          <p class="input-hint">AI can make mistakes. Check important info.</p>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
